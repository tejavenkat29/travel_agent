# ----------------------------------------------------------------------------
# Full stack: FastAPI + PostgreSQL + Redis.  Run everything with:
#   docker compose up
# A .env file is optional (used for LLM keys etc.); the core stack boots without
# it because the critical connection settings are provided below.
# ----------------------------------------------------------------------------
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    # .env is optional — `required: false` lets the stack start without it.
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: production
      DEBUG: "false"
      # CHANGE THIS in real deployments (use a secret manager, not a literal).
      SECRET_KEY: ${SECRET_KEY:-local-compose-dev-secret-not-for-real-use}
      # Point the app at the compose service hostnames (not localhost).
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-travel}:${POSTGRES_PASSWORD:-travel}@postgres:5432/${POSTGRES_DB:-travel_planner}
      REDIS_URL: redis://redis:6379/0
      CACHE_BACKEND: redis
      # Lock CORS down to your real frontend origin(s) in production.
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      # Wait for the datastores to be HEALTHY before starting the API,
      # so migrations on startup can connect immediately.
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-travel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-travel}
      POSTGRES_DB: ${POSTGRES_DB:-travel_planner}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-travel} -d ${POSTGRES_DB:-travel_planner}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

# Named volumes persist data across `docker compose down`/`up`.
volumes:
  postgres_data:
  redis_data:
