[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = ["migrations", "flows", "venv"]

[tool.ruff.lint]
# Pyflakes (F), import sorting (I), pycodestyle errors (E), pyupgrade (UP).
select = ["F", "I", "E", "UP", "B"]
ignore = [
    "E501",  # line length handled by the formatter, not enforced hard
    "B008",  # FastAPI uses `Depends(...)` as a default argument by design
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-q"
